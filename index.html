<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - Restaurante</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section class="telefono inicio">
        <header class="portada">
            <div class="oscuro"></div>
            <div class="bienvenida">
                <h2>Good afternoon, John</h2>
                <p>It's time for lunch.</p>
            </div>

            <div class="buscador">
                <div class="ubicacion"><i class="fa-solid fa-location-dot"></i></div>
                <input type="text" placeholder="Search Restaurant">
                <button><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </header>

        <main class="contenido-inicio">
            <nav class="categorias">
                <a href="#"><i class="fa-solid fa-bowl-food"></i><span>CHINESE</span></a>
                <a href="#"><i class="fa-solid fa-bell-concierge"></i><span>TACOS</span></a>
                <a href="#"><i class="fa-solid fa-burger"></i><span>BURGER</span></a>
                <a href="#"><i class="fa-solid fa-cookie"></i><span>DONUT</span></a>
            </nav>

            <h3 class="subtitulo">OFFERS</h3>

            <a class="tarjeta-oferta" href="detalle.html">
                <div class="foto-oferta">
                    <img src="img/oferta.jpg" alt="Restaurante Gran Mahakam">
                    <span>1.3 km</span>
                </div>
                <div class="info-oferta">
                    <h3>Gran Mahakam</h3>
                    <p>Asian, Chinese 15 min</p>
                    <p>9:00-11:00</p>
                    <div class="estrellas">★★★★★ <small>(72)</small></div>
                </div>
                <div class="nota">4.8</div>
                <div class="precio">€ € €</div>
            </a>
        </main>
    </section>
</body>
</html>
