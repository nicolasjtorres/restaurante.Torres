<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producto - Grand Restaurant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section class="telefono producto">
        <a class="volver-producto" href="menu.html"><i class="fa-solid fa-arrow-left"></i></a>
        <img class="foto-producto" src="img/producto.jpg" alt="Pollo al horno">

        <main class="producto-info">
            <div class="titulo-precio">
                <h1>Oven Roasted Chicken<br>Chopped Salad</h1>
                <span>$6.99</span>
            </div>

            <p class="descripcion-producto">Lorem ipsum dolor sit amet, consectetur adipisicing elit, sed do eiusmod tempor incididunt ut minim veniam, quis nostrud exercitation ullamco.</p>

            <div class="nota-pedido">Add a note (extra sauce, no onions, etc.)</div>
        </main>

        <div class="acciones">
            <div class="cantidad"><button>-</button><span>2</span><button>+</button></div>
            <button class="agregar">ADD TO CART</button>
        </div>
    </section>
</body>
</html>
